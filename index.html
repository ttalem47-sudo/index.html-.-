<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | الكيان الموحد</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("Z76kmpd1JjA8aiAKG");
        })();
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            /* استخدام الصورة الأولى كخلفية ممتدة */
            background: #f4f4f4 url('IMG-20251130-WA0005_edit_253387990920577.jpg') no-repeat center center/cover;
            transition: background 0.8s ease-in-out;
            overflow: hidden;
            position: relative;
        }

        /* الطبقة الشفافة العلوية لتهدئة ألوان الخلفية فقط بدون اعتراض اللمس */
        .full-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1;
            pointer-events: none;
        }

        /* حاوية البطاقة الترحيبية - بنفس أسلوب وانحناءات الصورة تماماً */
        .card-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 440px;
            background: rgba(245, 245, 245, 0.85); /* خلفية بيضاء شفافة ناعمة */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 32px; /* حواف دائرية فخمة جداً كما في الصورة */
            padding: 30px 25px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: right; /* محاذاة النص لليمين مثل الصورة */
        }

        /* الحركات الانسيابية لتنقل النوافذ */
        .screen {
            display: none;
            opacity: 0;
            transform: scale(0.97);
            transition: all 0.4s ease-in-out;
        }
        
        .screen.active {
            display: block;
            opacity: 1;
            transform: scale(1);
            animation: fadeInCard 0.5s ease forwards;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* أسلوب العناوين الأزرق السماوي الفاخر من الصورة */
        .main-title {
            color: #31688b !important;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin: 0 0 25px 0;
            text-shadow: none !important;
        }

        /* أسلوب تسمية الحقول (الاسم، الدفعة، الجنس) بالرمادي الغامق الرفيع */
        label {
            display: block;
            color: #4a4a4a !important;
            font-weight: 600 !important;
            font-size: 16px;
            margin: 15px 5px 6px 0;
            text-shadow: none !important;
        }

        /* تصميم وتنسيق الحقول البيضاء الناعمة ذات الحواف الدائرية المميزة */
        input, select, textarea {
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 5px;
            border-radius: 20px; /* حواف دائرية متناسقة تماماً */
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.9);
            color: #333333;
            font-weight: 600;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
        }
        
        input::placeholder {
            color: #a0a0a0;
            font-weight: 500;
        }
        
        input:focus, select:focus, textarea:focus {
            background: #ffffff;
            border-color: #5ba4e6;
            box-shadow: 0 4px 12px rgba(91, 164, 230, 0.2);
        }
        
        select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%23777777' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: left 15px center;
        }

        /* تصميم الزر الأزرق السماوي المريح والأنيق المأخوذ من صورتك */
        button {
            background: #5ba4e6; /* اللون الأزرق السماوي الجميل */
            color: #ffffff;
            border: none;
            padding: 15px 20px;
            border-radius: 20px; /* نفس حواف حقول الإدخال */
            cursor: pointer;
            font-weight: 700;
            font-size: 18px;
            margin-top: 25px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(91, 164, 230, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }
        
        button:hover {
            background: #4993d6;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(91, 164, 230, 0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        button:disabled {
            background: #a4c7e6;
            cursor: not-allowed;
        }

        /* صندوق عرض الرسالة الترحيبية بأسلوب زجاجي شفاف وراقي */
        .message-box {
            text-align: justify; 
            max-height: 180px; 
            overflow-y: auto; 
            padding: 15px; 
            background: rgba(255, 255, 255, 0.6); 
            border-radius: 18px; 
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.03);
            margin: 15px 0;
        }
        
        .message-box p {
            color: #444444 !important;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.6;
            margin: 0;
            text-shadow: none !important;
        }

        /* أسلوب خزانة الرسائل المشتركة في أسفل الشاشة الترحيبية الثانية */
        .archive-box {
            background: rgba(36, 54, 86, 0.9); /* اللون الكحلي الفخم من الصورة */
            border-radius: 24px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        
        .archive-title {
            color: #5ba4e6 !important; /* عنوان الخزانة باللون الأزرق السماوي */
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
            text-shadow: none !important;
        }

        .archive-item {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .archive-item:last-child { margin-bottom: 0; }
        
        .archive-item .meta {
            color: #aed1f2 !important;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            text-shadow: none !important;
        }
        .archive-item .txt {
            color: #ffffff !important;
            font-size: 14px;
            font-weight: 500;
            margin: 0;
            text-shadow: none !important;
        }
    </style>
</head>
<body>

    <div class="full-overlay"></div>

    <div class="card-container">
        
        <div id="screen1" class="screen active">
            <div class="main-title">تسجيل الدخول</div>
            
            <label for="studentName">الاسم:</label>
            <input type="text" id="studentName" placeholder="إبراهيم محمد" required autocomplete="off">
            
            <label for="batch">رقم الدفعة:</label>
            <select id="batch">
                <option value="" disabled selected>اختر الدفعة...</option>
                <option value="23">دفعة 23</option>
                <option value="24">دفعة 24</option>
            </select>
            
            <label for="gender">الجنس:</label>
            <select id="gender">
                <option value="" disabled selected>اختر الجنس...</option>
                <option value="ذكر">ذكر</option>
                <option value="بنت">بنت</option>
            </select>
            
            <button onclick="goToScreen2()">تسجيل الدخول</button>
        </div>

        <div id="screen2" class="screen">
            <div class="main-title" id="welcomeTitle">يا هندسة!</div>
            
            <div class="message-box">
                <p id="welcomeMessage"></p>
            </div>
            
            <label for="studentMessage">اكتب رسالة لزملائك في الكيان:</label>
            <textarea id="studentMessage" rows="3" placeholder="حياة أكاديمية موفقة للجميع..."></textarea>
            
            <button id="sendBtn" onclick="sendToGmail()">إرسال الرسالة</button>

            <div class="archive-box">
                <div class="archive-title">خزانة رسائل الكيان الموحد المشتركة</div>
                <div class="archive-item">
                    <div class="meta">
                        <span>بشمهندس / عبد الرحمن (دفعة 24)</span>
                        <span>٠١:٥١ م</span>
                    </div>
                    <p class="txt">حياة أكاديمية موفقة للجميع</p>
                </div>
            </div>
        </div>

        <div id="screen3" class="screen" style="text-align: center;">
            <div style="font-size: 55px; margin: 20px 0 10px 0;">✨</div>
            <div class="main-title" style="color: #43a047 !important; margin-bottom: 10px;">تم الإرسال بنجاح!</div>
            <p style="color: #555555; font-weight: 600; font-size: 16px; text-align: center; line-height: 1.6;">
                رسالتك حُفظت الآن في الخزانة بنجاح.<br>شكراً لك يا هندسة!
            </p>
        </div>
    </div>

    <script>
        // مصفوفة الرسائل الترحيبية المنسقة
        const messages = {
            '23': {
                'بنت': "أهلاً بكِ يا هندسة في بيتكِ الجديد. نرحب بكِ أجمل ترحيب في رحاب الكيان الموحد، حيث يلتقي الطموح بالإبداع. مرحباً بكِ معنا في كياننا العام، حيث نلتحم اليوم كدفعتين 23 و 24 معاً لنصنع التغيير ونقود المستقبل بروح واحدة. نحن هنا لسنا مجرد زميلات دراسة، بل أسرة واحدة يجمعنا شغف البناء والتطوير. حتماً سيكون بيننا تعاون مثمر ومستمر، نتبادل فيه الخبرات والمعارف لنتجاوز معاً كل التحديات الهندسية والصعاب الأكاديمية. ثقي بأن بصمتكِ في هذه الكلية ستكون مميزة، ومعاً كطالبات هندسة سنثبت أن الإبداع لا حدود له، وأننا قادرات على صياغة النجاح بأيدينا. أهلاً بكِ في رحلة العطاء والتميز تحت سقف واحد.",
                'ذكر': "أهلاً بك يا هندسة في بيتك الجديد. نرحب بك أجمل ترحيب في رحاب الكيان الموحد، حيث يلتقي الطموح بالإبداع. مرحباً بك معنا في كياننا العام، حيث نلتحم اليوم كدفعتين 23 و 24 معاً لنصنع التغيير ونقود المستقبل بروح واحدة. نحن هنا لسنا مجرد زملاء دراسة، بل أسرة واحدة يجمعنا شغف البناء والتطوير. حتماً سيكون بيننا تعاون مثمر ومستمر، نتبادل فيه الخبرات والمعارف لنتجاوز معاً كل التحديات الهندسية والصعاب الأكاديمية. ثق بأن بصمتك في هذه الكلية ستكون مميزة، ومعاً كطلاب هندسة سنثبت أن الإبداع لا حدود له، وأننا قادرون على صياغة النجاح بأيدينا. أهلاً بك في رحلة العطاء والتميز تحت سقف واحد."
            },
            '24': {
                'بنت': "مرحباً بكِ يا هندسة في انطلاقتكِ الجديدة مع دفعة 24. نحن هنا اليوم لنؤكد أن المسيرة مستمرة، وأننا معاً سنكون أقوى وأفضل بإذن الله. إن دمجنا مع دفعة 23 ليس مجرد خطوة أكاديمية، بل هو فرصة عظيمة وتاريخية لنكون أحسن، ولنستفيد من خبراتهم ونتكامل معهم بروح واحدة وعزيمة لا تلين. سنواصل طريقنا بكل ثقة، وسنضع يداً بيد لنصنع تجربة جامعية وهندسية فريدة ومتميزة تليق بنا جميعاً. أهلاً بكِ في هذا الكيان النابض بالطاقة.",
                'ذكر': "مرحباً بك يا هندسة في انطلاقتك الجديدة مع دفعة 24. نحن هنا اليوم لنؤكد أن المسيرة مستمرة، وأننا معاً سنكون أقوى وأفضل بإذن الله. إن دمجنا مع دفعة 23 ليس مجرد خطوة أكاديمية، بل هو فرصة عظيمة وتاريخية لنكون أحسن، ولنستفيد من خبراتهم ونتكامل معهم بروح واحدة وعزيمة لا تلين. سنواصل طريقنا بكل ثقة، وسنضع يداً بيد لنصنع تجربة جامعية وهندسية فريدة ومتميزة تليق بنا جميعاً. أهلاً بك في هذا الكيان النابض بالطاقة."
            }
        };

        // مصفوفة الخلفيات المحددة
        const backgrounds = [
            'IMG-20251130-WA0005_edit_253387990920577.jpg',
            'IMG-20251130-WA0012_edit_253406498166039.jpg',
            'IMG-20251130-WA0016_edit_253425409552073.jpg'
        ];
        
        let studentName, batch, gender;

        function goToScreen2() {
            studentName = document.getElementById('studentName').value.trim();
            batch = document.getElementById('batch').value;
            gender = document.getElementById('gender').value;

            if(!studentName || !batch || !gender) {
                alert('يا هندسة، الرجاء إدخال الاسم واختيار الدفعة والجنس أولاً!');
                return;
            }

            let title = gender === 'بنت' ? `مرحباً بكِ يا بشمهندسة ${studentName}` : `مرحباً بك يا بشمهندس ${studentName}`;
            document.getElementById('welcomeTitle').innerText = title;
            document.getElementById('welcomeMessage').innerText = messages[batch][gender];

            document.getElementById('screen1').classList.remove('active');
            setTimeout(() => {
                document.getElementById('screen2').classList.add('active');
                document.body.style.backgroundImage = `url('${backgrounds[1]}')`;
            }, 50);
        }

        function sendToGmail() {
            const messageText = document.getElementById('studentMessage').value.trim();
            if(!messageText) {
                alert('الرجاء كتابة رسالتك للخزانة أولاً!');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.innerText = "جاري حفظ الرسالة...";
            sendBtn.disabled = true;

            const templateParams = {
                student_name: studentName,
                batch: "دفعة " + batch,
                gender: gender,
                message: messageText
            };

            const serviceID = "service_a8wqxpn";
            const templateID = "template_4eh8cls";

            emailjs.send(serviceID, templateID, templateParams)
                .then(function(response) {
                    document.getElementById('screen2').classList.remove('active');
                    setTimeout(() => {
                        document.getElementById('screen3').classList.add('active');
                        document.body.style.backgroundImage = `url('${backgrounds[2]}')`;
                    }, 50);
                }, function(error) {
                    console.error("خطأ:", error);
                    alert("حدث خطأ أثناء الإرسال، حاول مجدداً يا هندسة.");
                    sendBtn.innerText = "إرسال الرسالة";
                    sendBtn.disabled = false;
                });
        }
    </script>
</body>
</html>
