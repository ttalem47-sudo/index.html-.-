<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الترحيب والدمج | هندسة</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("Z76kmpd1JjA8aiAKG");
        })();
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            /* الصورة الأولى كخلفية أساسية للموقع */
            background: #f4f4f4 url('IMG-20251130-WA0005_edit_253387990920577.jpg') no-repeat center center/cover;
            transition: background 1s ease-in-out;
            overflow: hidden;
            position: relative;
        }

        /* الطبقة الشفافة التي تغطي الواجهة بالكامل فوق الصورة لحماية النصوص */
        .full-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1;
        }

        /* حاوية المحتوى بدون صندوق زجاجي - ممتدة وشفافة تماماً */
        .content-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .screen {
            display: none;
            animation: fadeIn 0.6s ease forwards;
        }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تطبيق الخط الأسود العريض مع حدود وظل أبيض قوي لتظهر الكتابة بوضوح ممتاز */
        h2, h3, p, label {
            color: #000000 !important;
            font-weight: 800 !important;
            /* تأثير إحاطة النص باللون الأبيض المتوهج */
            text-shadow: 
                -2px -2px 0 #ffffff,  
                 2px -2px 0 #ffffff,
                -2px  2px 0 #ffffff,
                 2px  2px 0 #ffffff,
                 0px  4px 10px rgba(255,255,255,0.9);
        }

        h2 { font-size: 28px; margin-bottom: 5px; }
        h3 { font-size: 24px; margin-top: 0; }
        p { font-size: 16px; line-height: 1.6; }

        /* تنسيق الحقول لتكون واضحة ومريحة في الكتابة والقراءة بالخط الأسود */
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border-radius: 14px;
            border: 2px solid #000000;
            background: rgba(255, 255, 255, 0.9);
            color: #000000;
            font-weight: 700;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input::placeholder, textarea::placeholder {
            color: rgba(0, 0, 0, 0.6);
        }
        input:focus, select:focus, textarea:focus {
            background: #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.8), 0 4px 10px rgba(0,0,0,0.2);
        }
        select option { color: #000000; background: #ffffff; }
        
        /* تصميم زر الدخول والإرسال باللون الأسود الملكي والكتابة بالأبيض */
        button {
            background: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 30px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:hover {
            background: #222222;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        button:disabled {
            background: #555555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="full-overlay"></div>

    <div class="content-container">
        
        <div id="screen1" class="screen active">
            <h2>مرحباً بك في الكيان الموحد</h2>
            <p style="margin-bottom: 25px;">سجّل بياناتك للانضمام إلينا</p>
            
            <input type="text" id="studentName" placeholder="الاسم الكامل" required>
            
            <select id="batch">
                <option value="" disabled selected>اختر الدفعة</option>
                <option value="23">دفعة 23</option>
                <option value="24">دفعة 24</option>
            </select>
            
            <select id="gender">
                <option value="" disabled selected>الجنس</option>
                <option value="ذكر">ذكر</option>
                <option value="بنت">بنت</option>
            </select>
            
            <button onclick="goToScreen2()">دخول</button>
        </div>

        <div id="screen2" class="screen">
            <h3 id="welcomeTitle">يا هندسة!</h3>
            <p id="welcomeMessage" style="text-align: justify; max-height: 200px; overflow-y: auto; padding-right: 5px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 8px;"></p>
            
            <hr style="border: 0; border-top: 2px solid #000000; margin: 20px 0;">
            
            <p style="margin-bottom: 5px;">اكتب رسالة لزملائك في الكيان (الخزانة):</p>
            <textarea id="studentMessage" rows="4" placeholder="عبر عن مشاعرك أو ترحيبك هنا..."></textarea>
            
            <button id="sendBtn" onclick="sendToGmail()">إرسال الرسالة</button>
        </div>

        <div id="screen3" class="screen">
            <div style="font-size: 60px; margin-bottom: 10px; text-shadow: none;">✨</div>
            <h2>تم الإرسال بنجاح!</h2>
            <p>رسالتك الآن نزلت في الخزانة الحافظة للذكريات. شكرًا لك يا هندسة!</p>
        </div>
    </div>

    <script>
        const messages = {
            '23': {
                'بنت': "أهلاً بكِ يا هندسة في بيتكِ الجديد. نرحب بكِ أجمل ترحيب في رحاب الكيان الموحد، حيث يلتقي الطموح بالإبداع. مرحباً بكِ معنا في كياننا العام، حيث نلتحم اليوم كدفعتين 23 و 24 معاً لنصنع التغيير ونقود المستقبل بروح واحدة. نحن هنا لسنا مجرد زميلات دراسة، بل أسرة واحدة يجمعنا شغف البناء والتطوير. حتماً سيكون بيننا تعاون مثمر ومستمر، نتبادل فيه الخبرات والمعارف لنتجاوز معاً كل التحديات الهندسية والصعاب الأكاديمية. ثقي بأن بصمتكِ في هذه الكلية ستكون مميزة، ومعاً كطالبات هندسة سنثبت أن الإبداع لا حدود له، وأننا قادرات على صياغة النجاح بأيدينا. أهلاً بكِ في رحلة العطاء والتميز تحت سقف واحد.",
                'ذكر': "أهلاً بك يا هندسة في بيتك الجديد. نرحب بك أجمل ترحيب في رحاب الكيان الموحد، حيث يلتقي الطموح بالإبداع. مرحباً بك معنا في كياننا العام، حيث نلتحم اليوم كدفعتين 23 و 24 معاً لنصنع التغيير ونقود المستقبل بروح واحدة. نحن هنا لسنا مجرد زملاء دراسة، بل أسرة واحدة يجمعنا شغف البناء والتطوير. حتماً سيكون بيننا تعاون مثمر ومستمر، نتبادل فيه الخبرات والمعارف لنتجاوز معاً كل التحديات الهندسية والصعاب الأكاديمية. ثق بأن بصمتك في هذه الكلية ستكون مميزة، ومعاً كطلاب هندسة سنثبت أن الإبداع لا حدود له، وأننا قادرون على صياغة النجاح بأيدينا. أهلاً بك في رحلة العطاء والتميز تحت سقف واحد."
            },
            '24': {
                'بنت': "مرحباً بكِ يا هندسة في انطلاقتكِ الجديدة مع دفعة 24. نحن هنا اليوم لنؤكد أن المسيرة مستمرة، وأننا معاً سنكون أقوى وأفضل بإذن الله. إن دمجنا مع دفعة 23 ليس مجرد خطوة أكاديمية، بل هو فرصة عظيمة وتاريخية لنكون أحسن، ولنستفيد من خبراتهم ونتكامل معهم بروح واحدة وعزيمة لا تلين. سنواصل طريقنا بكل ثقة، وسنضع يداً بيد لنصنع تجربة جامعية وهندسية فريدة ومتميزة تليق بنا جميعاً. أهلاً بكِ في هذا الكيان النابض بالطاقة.",
                'ذكر': "مرحباً بك يا هندسة في انطلاقتك الجديدة مع دفعة 24. نحن هنا اليوم لنؤكد أن المسيرة مستمرة، وأننا معاً سنكون أقوى وأفضل بإذن الله. إن دمجنا مع دفعة 23 ليس مجرد خطوة أكاديمية، بل هو فرصة عظيمة وتاريخية لنكون أحسن، ولنستفيد من خبراتهم ونتكامل معهم بروح واحدة وعزيمة لا تلين. سنواصل طريقنا بكل ثقة، وسنضع يداً بيد لنصنع تجربة جامعية وهندسية فريدة ومتميزة تليق بنا جميعاً. أهلاً بك في هذا الكيان النابض بالطاقة."
            }
        };

        // أسماء الصور الثلاثة المستعملة للواجهات بالترتيب كما أرسلتها تماماً
        const backgrounds = [
            'IMG-20251130-WA0005_edit_253387990920577.jpg',
            'IMG-20251130-WA0012_edit_253406498166039.jpg',
            'IMG-20251130-WA0016_edit_253425409552073.jpg'
        ];
        
        let studentName, batch, gender;

        function goToScreen2() {
            studentName = document.getElementById('studentName').value.trim();
            batch = document.getElementById('batch').value;
            gender = document.getElementById('gender').value;

            if(!studentName || !batch || !gender) {
                alert('يا هندسة، الرجاء ملء جميع الحقول أولاً!');
                return;
            }

            let title = gender === 'بنت' ? `مرحباً بكِ يا بشمهندسة ${studentName}` : `مرحباً بك يا بشمهندس ${studentName}`;
            document.getElementById('welcomeTitle').innerText = title;
            document.getElementById('welcomeMessage').innerText = messages[batch][gender];

            document.getElementById('screen1').classList.remove('active');
            document.getElementById('screen2').classList.add('active');
            // تغيير صورة الخلفية للواجهة الثانية
            document.body.style.backgroundImage = `url('${backgrounds[1]}')`;
        }

        function sendToGmail() {
            const messageText = document.getElementById('studentMessage').value.trim();
            if(!messageText) {
                alert('الرجاء كتابة رسالتك للخزانة أولاً يا هندسة!');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.innerText = "جاري الحفظ في الخزانة...";
            sendBtn.disabled = true;

            const templateParams = {
                student_name: studentName,
                batch: "دفعة " + batch,
                gender: gender,
                message: messageText
            };

            const serviceID = "service_a8wqxpn";
            const templateID = "template_4eh8cls";

            emailjs.send(serviceID, templateID, templateParams)
                .then(function(response) {
                    document.getElementById('screen2').classList.remove('active');
                    document.getElementById('screen3').classList.add('active');
                    // تغيير صورة الخلفية للواجهة الثالثة والأخيرة
                    document.body.style.backgroundImage = `url('${backgrounds[2]}')`;
                }, function(error) {
                    console.error("فشل الإرسال:", error);
                    alert("عذراً يا هندسة، حدث خطأ أثناء الإرسال. حاول مرة أخرى.");
                    sendBtn.innerText = "إرسال الرسالة";
                    sendBtn.disabled = false;
                });
        }
    </script>
</body>
</html>
