<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الترحيب والدمج | هندسة</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("Z76kmpd1JjA8aiAKG");
        })();
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            /* الصورة الأولى كخلفية ممتدة لكامل الشاشة */
            background: #f4f4f4 url('IMG-20251130-WA0005_edit_253387990920577.jpg') no-repeat center center/cover;
            transition: background 0.8s ease-in-out;
            overflow: hidden;
            position: relative;
        }

        /* الطبقة العلوية الشفافة المدمجة لتهدئة ألوان الخلفية ومنع اعتراض اللمس */
        .full-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1;
            pointer-events: none; /* تضمن مرور النقرات واللمس للحقول بدون أي حجب */
        }

        /* حاوية المحتوى الرئيسية - حيوية وسلسة وممتدة */
        .content-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 480px;
            text-align: center;
            padding: 25px;
            box-sizing: border-box;
        }

        /* حركات التبديل السلسة بين الشاشات */
        .screen {
            display: none;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s ease-in-out;
        }
        
        .screen.active {
            display: block;
            opacity: 1;
            transform: scale(1);
            animation: slideUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* إجبار الكتابة على اللون الأسود الحاد العريض ومحاطة بلون أبيض ناصع وبارز جداً */
        h2, h3, p, label {
            color: #000000 !important;
            font-weight: 900 !important;
            margin: 0 0 10px 0;
            /* تحديد الحواف باللون الأبيض بشكل دائري مكثف ومحكم لقراءة ممتازة */
            text-shadow: 
                -2px -2px 0 #ffffff,  
                 2px -2px 0 #ffffff,
                -2px  2px 0 #ffffff,
                 2px  2px 0 #ffffff,
                -1px -2px 0 #ffffff,  
                 1px -2px 0 #ffffff,
                -1px  2px 0 #ffffff,
                 1px  2px 0 #ffffff,
                -2px -1px 0 #ffffff,  
                 2px -1px 0 #ffffff,
                -2px  1px 0 #ffffff,
                 2px  1px 0 #ffffff,
                 0px  4px 12px rgba(255,255,255,1);
        }

        h2 { font-size: 28px; line-height: 1.3; }
        h3 { font-size: 24px; }
        p { font-size: 17px; line-height: 1.5; }

        /* تنسيق وتصميم الحقول لتكون حيوية وبارزة وقابلة للكتابة فوراً */
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border-radius: 14px;
            border: 3px solid #000000;
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            font-size: 17px;
            box-sizing: border-box;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(0, 0, 0, 0.55);
        }
        
        input:focus, select:focus, textarea:focus {
            background: #ffffff;
            border-color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }
        
        select option { color: #000000; background: #ffffff; }
        
        /* أزرار تفاعلية فخمة باللون الأسود الملكي */
        button {
            background: #000000;
            color: #ffffff;
            border: 3px solid #ffffff;
            padding: 15px 30px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 900;
            font-size: 19px;
            margin-top: 10px;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        button:hover {
            background: #1b1b1b;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        
        button:active {
            transform: translateY(-1px) scale(1);
        }
        
        button:disabled {
            background: #666666;
            cursor: not-allowed;
            transform: none;
        }

        /* تخصيص صندوق عرض الرسالة الترحيبية في الواجهة الثانية */
        .message-box {
            text-align: justify; 
            max-height: 180px; 
            overflow-y: auto; 
            padding: 15px; 
            background: rgba(255, 255, 255, 0.75); 
            border-radius: 12px; 
            border: 2px solid #000000;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="full-overlay"></div>

    <div class="content-container">
        
        <div id="screen1" class="screen active">
            <h2>مرحباً بك في الكيان الموحد</h2>
            <p style="margin-bottom: 20px;">سجّل بياناتك للانضمام إلينا</p>
            
            <input type="text" id="studentName" placeholder="الاسم الكامل" required autocomplete="off">
            
            <select id="batch">
                <option value="" disabled selected>اختر الدفعة</option>
                <option value="23">دفعة 23</option>
                <option value="24">دفعة 24</option>
            </select>
            
            <select id="gender">
                <option value="" disabled selected>الجنس</option>
                <option value="ذكر">ذكر</option>
                <option value="بنت">بنت</option>
            </select>
            
            <button onclick="goToScreen2()">دخول</button>
        </div>

        <div id="screen2" class="screen">
            <h3 id="welcomeTitle">يا هندسة!</h3>
            <div class="message-box">
                <p id="welcomeMessage" style="text-shadow: none !important; font-size: 15px; font-weight: 700; margin: 0;"></p>
            </div>
            
            <hr style="border: 0; border-top: 3px solid #000000; margin: 15px 0;">
            
            <p style="margin-bottom: 5px;">اكتب رسالة لزملائك في الكيان (الخزانة):</p>
            <textarea id="studentMessage" rows="3" placeholder="عبر عن مشاعرك أو ترحيبك هنا..."></textarea>
            
            <button id="sendBtn" onclick="sendToGmail()">إرسال الرسالة</button>
        </div>

        <div id="screen3" class="screen">
            <div style="font-size: 65px; margin-bottom: 10px; animation: pulse 1.5s infinite; text-shadow: none;">✨</div>
            <h2>تم الإرسال بنجاح!</h2>
            <p>رسالتك الآن نزلت في الخزانة الحافظة للذكريات. شكرًا لك يا هندسة!</p>
        </div>
    </div>

    <script>
        // مصفوفة النصوص الترحيبية الثابتة والمنسقة هندسياً
        const messages = {
            '23': {
                'بنت': "أهلاً بكِ يا هندسة في بيتكِ الجديد. نرحب بكِ أجمل ترحيب في رحاب الكيان الموحد، حيث يلتقي الطموح بالإبداع. مرحباً بكِ معنا في كياننا العام، حيث نلتحم اليوم كدفعتين 23 و 24 معاً لنصنع التغيير ونقود المستقبل بروح واحدة. نحن هنا لسنا مجرد زميلات دراسة، بل أسرة واحدة يجمعنا شغف البناء والتطوير. حتماً سيكون بيننا تعاون مثمر ومستمر، نتبادل فيه الخبرات والمعارف لنتجاوز معاً كل التحديات الهندسية والصعاب الأكاديمية. ثقي بأن بصمتكِ في هذه الكلية ستكون مميزة، ومعاً كطالبات هندسة سنثبت أن الإبداع لا حدود له، وأننا قادرات على صياغة النجاح بأيدينا. أهلاً بكِ في رحلة العطاء والتميز تحت سقف واحد.",
                'ذكر': "أهلاً بك يا هندسة في بيتك الجديد. نرحب بك أجمل ترحيب في رحاب الكيان الموحد، حيث يلتقي الطموح بالإبداع. مرحباً بك معنا في كياننا العام، حيث نلتحم اليوم كدفعتين 23 و 24 معاً لنصنع التغيير ونقود المستقبل بروح واحدة. نحن هنا لسنا مجرد زملاء دراسة، بل أسرة واحدة يجمعنا شغف البناء والتطوير. حتماً سيكون بيننا تعاون مثمر ومستمر، نتبادل فيه الخبرات والمعارف لنتجاوز معاً كل التحديات الهندسية والصعاب الأكاديمية. ثق بأن بصمتك في هذه الكلية ستكون مميزة، ومعاً كطلاب هندسة سنثبت أن الإبداع لا حدود له، وأننا قادرون على صياغة النجاح بأيدينا. أهلاً بك في رحلة العطاء والتميز تحت سقف واحد."
            },
            '24': {
                'بنت': "مرحباً بكِ يا هندسة في انطلاقتكِ الجديدة مع دفعة 24. نحن هنا اليوم لنؤكد أن المسيرة مستمرة، وأننا معاً سنكون أقوى وأفضل بإذن الله. إن دمجنا مع دفعة 23 ليس مجرد خطوة أكاديمية، بل هو فرصة عظيمة وتاريخية لنكون أحسن، ولنستفيد من خبراتهم ونتكامل معهم بروح واحدة وعزيمة لا تلين. سنواصل طريقنا بكل ثقة، وسنضع يداً بيد لنصنع تجربة جامعية وهندسية فريدة ومتميزة تليق بنا جميعاً. أهلاً بكِ في هذا الكيان النابض بالطاقة.",
                'ذكر': "مرحباً بك يا هندسة في انطلاقتك الجديدة مع دفعة 24. نحن هنا اليوم لنؤكد أن المسيرة مستمرة، وأننا معاً سنكون أقوى وأفضل بإذن الله. إن دمجنا مع دفعة 23 ليس مجرد خطوة أكاديمية، بل هو فرصة عظيمة وتاريخية لنكون أحسن، ولنستفيد من خبراتهم ونتكامل معهم بروح واحدة وعزيمة لا تلين. سنواصل طريقنا بكل ثقة، وسنضع يداً بيد لنصنع تجربة جامعية وهندسية فريدة ومتميزة تليق بنا جميعاً. أهلاً بك في هذا الكيان النابض بالطاقة."
            }
        };

        // أسماء الصور الخلفية للتحويل السلس والمنظم
        const backgrounds = [
            'IMG-20251130-WA0005_edit_253387990920577.jpg',
            'IMG-20251130-WA0012_edit_253406498166039.jpg',
            'IMG-20251130-WA0016_edit_253425409552073.jpg'
        ];
        
        let studentName, batch, gender;

        function goToScreen2() {
            studentName = document.getElementById('studentName').value.trim();
            batch = document.getElementById('batch').value;
            gender = document.getElementById('gender').value;

            if(!studentName || !batch || !gender) {
                alert('يا هندسة، الرجاء ملء جميع الحقول أولاً للكشف عن ترحيبك!');
                return;
            }

            let title = gender === 'بنت' ? `مرحباً بكِ يا بشمهندسة ${studentName}` : `مرحباً بك يا بشمهندس ${studentName}`;
            document.getElementById('welcomeTitle').innerText = title;
            document.getElementById('welcomeMessage').innerText = messages[batch][gender];

            // تحويل سلس وسريع إلى الواجهة الثانية
            document.getElementById('screen1').classList.remove('active');
            setTimeout(() => {
                document.getElementById('screen2').classList.add('active');
                document.body.style.backgroundImage = `url('${backgrounds[1]}')`;
            }, 100);
        }

        function sendToGmail() {
            const messageText = document.getElementById('studentMessage').value.trim();
            if(!messageText) {
                alert('الرجاء كتابة رسالتك وحفظها في الخزانة أولاً يا هندسة!');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.innerText = "جاري الإرسال والحفظ بالخزانة...";
            sendBtn.disabled = true;

            const templateParams = {
                student_name: studentName,
                batch: "دفعة " + batch,
                gender: gender,
                message: messageText
            };

            const serviceID = "service_a8wqxpn";
            const templateID = "template_4eh8cls";

            emailjs.send(serviceID, templateID, templateParams)
                .then(function(response) {
                    document.getElementById('screen2').classList.remove('active');
                    setTimeout(() => {
                        document.getElementById('screen3').classList.add('active');
                        document.body.style.backgroundImage = `url('${backgrounds[2]}')`;
                    }, 100);
                }, function(error) {
                    console.error("خطأ تقني في الإرسال:", error);
                    alert("عذراً يا هندسة، حدث خطأ أثناء الاتصال بالسيرفر. حاول مرة أخرى.");
                    sendBtn.innerText = "إرسال الرسالة";
                    sendBtn.disabled = false;
                });
        }
    </script>
</body>
</html>
